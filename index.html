<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeos para Status — Portal Patriota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --verde:  #009C3B;
    --amarelo:#FFDF00;
    --azul:   #002776;
    --preto:  #0d0d0d;
    --cinza:  #999;
    --borda:  #d8d4cc;
    --bg:     #f5f4f0;
  }

  body {
    background: var(--bg);
    font-family: 'Cinzel', Georgia, serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
    -webkit-tap-highlight-color: transparent;
  }

  header { text-align: center; margin-bottom: 32px; }

  .flag-bar {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-bottom: 18px;
  }
  .flag-bar span { display: block; height: 3px; border-radius: 2px; }
  .flag-bar .g { width: 40px; background: var(--verde); }
  .flag-bar .y { width: 64px; background: var(--amarelo); }
  .flag-bar .b { width: 28px; background: var(--azul); }

  h1 {
    font-size: clamp(1.1rem, 4vw, 1.7rem);
    font-weight: 900;
    color: var(--azul);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 0.65rem;
    color: var(--cinza);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .instruction {
    text-align: center;
    font-size: 0.85rem;
    color: #555;
    margin: 0 auto 28px;
    max-width: 460px;
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  /* ===== GRADE DE VÍDEOS ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    max-width: 980px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border: 1px solid var(--borda);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card:hover, .card:active {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,39,118,0.16);
  }

  .thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    background: #000;
    overflow: hidden;
  }
  .thumb video, .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb::after {
    content: '▶';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 2.2rem;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    pointer-events: none;
  }

  .card-info {
    padding: 10px 12px;
    text-align: center;
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--azul);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.3;
  }

  /* ===== MODAL DO PLAYER ===== */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal.open { display: flex; }

  .modal-content {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .player-wrap {
    width: 100%;
    max-height: 65vh;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }
  .player-wrap video {
    max-width: 100%;
    max-height: 65vh;
    display: block;
  }

  .btn-baixar {
    width: 100%;
    max-width: 420px;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
    background: var(--verde);
    border: none;
    border-radius: 10px;
    padding: 18px 24px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,156,59,0.45);
    transition: transform 0.12s, background 0.18s;
  }
  .btn-baixar:hover  { background: #007a2e; }
  .btn-baixar:active { transform: scale(0.97); }
  .btn-baixar:disabled { opacity: 0.5; cursor: wait; }

  .btn-fechar {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    padding: 10px 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-fechar:hover { background: rgba(255,255,255,0.1); }

  .status-msg {
    color: #fff;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    min-height: 18px;
    text-align: center;
  }

  /* ===== ESTADOS ===== */
  .loading, .empty, .erro {
    text-align: center;
    color: var(--cinza);
    padding: 60px 20px;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .loading::before {
    content: '⏳';
    display: block;
    font-size: 2rem;
    margin-bottom: 12px;
  }
  .erro { color: #b00; }
</style>
</head>
<body>

<header>
  <div class="flag-bar">
    <span class="g"></span><span class="y"></span><span class="b"></span>
    <span class="y"></span><span class="g"></span>
  </div>
  <h1>Vídeos para Status</h1>
  <p class="tagline">Portal Patriota App</p>
</header>

<p class="instruction">
  Toque em qualquer vídeo abaixo para abrir.<br>
  Depois é só tocar no botão verde para baixar ou compartilhar no WhatsApp.
</p>

<div class="grid" id="grid">
  <div class="loading" style="grid-column: 1/-1;">Carregando vídeos…</div>
</div>

<!-- Modal do Player -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="player-wrap">
      <video id="player" controls playsinline preload="metadata"></video>
    </div>
    <button class="btn-baixar" id="btnBaixar" onclick="baixarOuCompartilhar()">
      ⬇ Baixar / Compartilhar
    </button>
    <div class="status-msg" id="status"></div>
    <button class="btn-fechar" onclick="fecharModal()">✕ Fechar</button>
  </div>
</div>

<script>
// ========================================================
// CONFIGURAÇÃO — só edite aqui se mudar de repositório
// ========================================================
const GITHUB_USER = 'portalpatriota-app';
const GITHUB_REPO = 'videos-status';
const GITHUB_BRANCH = 'main';
const PASTA_VIDEOS = 'videos';
// ========================================================

const grid    = document.getElementById('grid');
const modal   = document.getElementById('modal');
const player  = document.getElementById('player');
const btnBaixar = document.getElementById('btnBaixar');
const status  = document.getElementById('status');
let videoAtual = null;
let listaVideos = [];

// Transforma "brasil-acima-de-tudo.mp4" em "Brasil Acima De Tudo"
function nomeBonito(nomeArquivo) {
  return nomeArquivo
    .replace(/\.(mp4|mov|webm|m4v)$/i, '')   // tira extensão
    .replace(/[-_]+/g, ' ')                   // troca - e _ por espaço
    .replace(/\s+/g, ' ')                     // normaliza espaços
    .trim()
    .split(' ')
    .map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase())
    .join(' ');
}

// Busca a lista de vídeos no GitHub
async function carregarVideos() {
  const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${PASTA_VIDEOS}?ref=${GITHUB_BRANCH}`;

  try {
    const resp = await fetch(apiUrl);
    if (!resp.ok) {
      throw new Error(`API retornou ${resp.status}`);
    }
    const arquivos = await resp.json();

    // Filtra só vídeos
    listaVideos = arquivos
      .filter(a => a.type === 'file' && /\.(mp4|mov|webm|m4v)$/i.test(a.name))
      .map(a => ({
        titulo: nomeBonito(a.name),
        arquivo: a.download_url,
        nomeOriginal: a.name
      }))
      .sort((a, b) => a.titulo.localeCompare(b.titulo, 'pt-BR'));

    renderGrid();
  } catch (err) {
    grid.innerHTML = `
      <div class="erro" style="grid-column: 1/-1;">
        Não foi possível carregar os vídeos.<br>
        <small>Verifique se a pasta "${PASTA_VIDEOS}" existe no repositório.</small>
      </div>`;
    console.error(err);
  }
}

// Renderiza a grade
function renderGrid() {
  if (!listaVideos.length) {
    grid.innerHTML = '<div class="empty" style="grid-column: 1/-1;">Nenhum vídeo disponível no momento.</div>';
    return;
  }
  grid.innerHTML = listaVideos.map((v, i) => `
    <div class="card" onclick="abrirVideo(${i})">
      <div class="thumb">
        <video src="${v.arquivo}#t=0.5" muted preload="metadata" playsinline></video>
      </div>
      <div class="card-info">
        <div class="card-title">${v.titulo}</div>
      </div>
    </div>
  `).join('');
}

function abrirVideo(idx) {
  videoAtual = listaVideos[idx];
  player.src = videoAtual.arquivo;
  modal.classList.add('open');
  status.textContent = '';
  document.body.style.overflow = 'hidden';
}

function fecharModal() {
  modal.classList.remove('open');
  player.pause();
  player.src = '';
  document.body.style.overflow = '';
  status.textContent = '';
}

// Fecha modal ao tocar fora
modal.addEventListener('click', (e) => {
  if (e.target === modal) fecharModal();
});

// ========================================================
// BAIXAR OU COMPARTILHAR
// ========================================================
async function baixarOuCompartilhar() {
  if (!videoAtual) return;

  const isMob = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const filename = videoAtual.nomeOriginal;

  btnBaixar.disabled = true;
  status.textContent = '⏳ Preparando vídeo…';

  try {
    const response = await fetch(videoAtual.arquivo);
    const blob = await response.blob();

    // Mobile: tenta share nativo
    if (isMob && navigator.canShare) {
      const file = new File([blob], filename, { type: 'video/mp4' });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: videoAtual.titulo
          });
          status.textContent = '✦ Compartilhado!';
          btnBaixar.disabled = false;
          return;
        } catch (err) {
          if (err.name === 'AbortError') {
            status.textContent = '';
            btnBaixar.disabled = false;
            return;
          }
        }
      }
    }

    // Desktop ou fallback: download direto
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    status.textContent = '✦ Baixado!';

  } catch (err) {
    status.textContent = 'Erro: ' + err.message;
  }

  btnBaixar.disabled = false;
}

// Inicia
carregarVideos();
</script>
</body>
</html>
